name: Python Runtime Gates

on:
  pull_request:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: python-gate-ci-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  import-check:
    name: Import Smoke Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13.14"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Run module import check
        run: uv run python -m CI.python_checks.import_check

  window-smoke:
    name: Window Smoke Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13.14"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Run main window smoke check
        run: uv run python -m CI.python_checks.window_smoke_check

  import-and-window-smoke:
    name: Import And Window Smoke
    if: ${{ always() }}
    needs:
      - import-check
      - window-smoke
    runs-on: windows-latest

    steps:
      - name: Verify import and window smoke checks
        shell: powershell
        run: |
          $importResult = "${{ needs.import-check.result }}"
          $windowResult = "${{ needs.window-smoke.result }}"
          Write-Host "Import smoke result: $importResult"
          Write-Host "Window smoke result: $windowResult"
          if ($importResult -ne "success" -or $windowResult -ne "success") {
            throw "Import or window smoke check did not pass."
          }

  live-runtime-regression-matrix:
    name: Live Runtime Checks
    needs:
      - import-and-window-smoke
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - config_name: wjx
            survey_url: https://v.wjx.cn/vm/ei3sVrE.aspx
          - config_name: credamo
            survey_url: https://www.credamo.com/s/A73QR3ano
          - config_name: tencent
            survey_url: https://wj.qq.com/s2/26070328/fa89/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13.14"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Run live runtime regression for ${{ matrix.config_name }}
        env:
          SURVEY_CONTROLLER_LIVE_TEST_URL: ${{ matrix.survey_url }}
        run: uv run pytest CI/live_tests/test_live_runtime_regression.py -ra -vv --tb=short --durations=10 --color=yes

  live-runtime-regression:
    name: Live Parser Regression
    if: ${{ always() && needs.import-and-window-smoke.result == 'success' }}
    needs:
      - import-and-window-smoke
      - live-runtime-regression-matrix
    runs-on: windows-latest

    steps:
      - name: Verify matrix result
        shell: powershell
        run: |
          $result = "${{ needs.live-runtime-regression-matrix.result }}"
          Write-Host "Live runtime regression matrix result: $result"
          if ($result -ne "success") {
            throw "Live runtime regression did not pass."
          }
