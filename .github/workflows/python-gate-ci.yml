name: Python Runtime Gates

on:
  pull_request:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: python-gate-ci-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  import-check:
    name: Import Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Install project
        run: uv pip install -e .

      - name: Run module import check
        run: uv run python -m CI.python_checks.import_check

  import-check-gate:
    name: Import Check Gate
    if: ${{ always() }}
    needs:
      - import-check
    runs-on: ubuntu-latest

    steps:
      - name: Verify import checks
        run: |
          echo "Import smoke result: ${{ needs.import-check.result }}"
          if [ "${{ needs.import-check.result }}" != "success" ]; then
            echo "Import smoke check did not pass."
            exit 1
          fi

  live-runtime-regression:
    name: Live Runtime Regression
    needs:
      - import-check-gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Install project
        run: uv pip install -e .

      - name: Run live runtime regression
        env:
          SURVEY_CONTROLLER_LIVE_TEST_URL: https://v.wjx.cn/vm/ei3sVrE.aspx
        run: uv run pytest CI/live_tests/test_live_runtime_regression.py -ra -vv --tb=short --durations=10 --color=yes
