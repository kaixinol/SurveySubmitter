# SurveyController CLI - Example Configuration
# Copy this file and edit to match your survey.
#
# Usage:
#   python cli.py run config.yaml
#   python cli.py run config.yaml --parse-only
#   python cli.py run config.yaml --log-level DEBUG

# ---------------------------------------------------------------------------
# Survey basics
# ---------------------------------------------------------------------------
survey:
  url: "https://www.wjx.cn/s/your-survey-id.aspx"
  title: ""                       # Optional; auto-detected if blank
  provider: "wjx"                 # "wjx" (default) or auto-detected from URL

# ---------------------------------------------------------------------------
# Execution settings
# ---------------------------------------------------------------------------
execution:
  # -- Targets & concurrency --
  target_num: 100                        # Number of submissions to collect
  num_threads: 4                         # Concurrent worker threads (max 64)

  # -- Timing --
  submit_interval_range_seconds: [5, 15] # Seconds between submissions (min, max)
  answer_duration_range_seconds: [60, 180] # Simulated answer duration in seconds (min, max)

  # Optional: restrict submissions to a datetime window
  # answer_datetime_window: ["2025-01-01 09:00:00", "2025-12-31 18:00:00"]
  answer_datetime_window: ["", ""]

  # -- Random IP / Proxy --
  random_proxy_ip: false
  proxy_source: "default"               # "default", "benefit", or "custom"
  custom_proxy_api: ""
  proxy_area_code: null                  # e.g. "110000" for Beijing, or null

  # -- Random User-Agent --
  random_user_agent: false
  user_agent_ratios:                     # Must sum to 100
    wechat: 33
    mobile: 33
    pc: 34

  # -- Failure handling --
  stop_on_fail: true                     # Stop on consecutive failures
  pause_on_aliyun_captcha: true          # Pause when Aliyun CAPTCHA is detected

  # -- Reliability --
  reliability_mode: true
  persona: true

  # -- AI configuration (optional) --
  ai:
    answering: true
    api_key: ""
    base_url: ""
    api_protocol: "auto"
    model: ""
    system_prompt: ""

  # -- Reverse fill (optional) --
  reverse_fill:
    enabled: false
    source_path: ""
    format: "auto"                       # "auto", "wjx_sequence", "wjx_score", "wjx_text"
    start_row: 1
    threads: 1

# ---------------------------------------------------------------------------
# Answer configuration
# ---------------------------------------------------------------------------
# survey_questions is the minimal question catalog persisted for the website
# to read and generate answering config from. It is populated automatically
# when you run the headless/dry-run generator (num/title/type_code/options/
# required only). The full survey definition is NOT persisted — it is
# re-parsed at runtime from the survey URL.
#
# survey_questions:
#   - num: 1
#     title: "Your gender"
#     question_type: "single"
#     options: ["Male", "Female", "Other", "Prefer not to say"]
#     required: true
#
# question_entries holds the per-question answering strategy (probabilities,
# fill texts, weights, ...). It is populated automatically when you export a
# config from the GUI or run the headless/dry-run generator.
#
# question_entries:
#   - question_num: 1
#     question_type: "single"
#     probabilities: [0.25, 0.25, 0.25, 0.25]
#     option_count: 4
#     distribution_mode: "random"
#     ...

answer_config:
  survey_questions: []
  question_entries: []
  answer_rules: []
